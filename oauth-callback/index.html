<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OAuth callback — Nature &amp; Space Facts</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         max-width: 640px; margin: 10vh auto; padding: 0 24px; color: #111; line-height: 1.55; }
  h1 { font-size: 20px; margin-bottom: 8px; }
  code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .box { background: #f9f9f9; border: 1px solid #e2e2e2; border-radius: 8px;
         padding: 16px; margin: 18px 0; word-break: break-all; font-family: monospace; font-size: 13px; }
  button { padding: 8px 14px; border-radius: 6px; border: 1px solid #d0d0d0;
           background: #fff; cursor: pointer; font-size: 14px; }
  button:hover { background: #f0f0f0; }
  .ok { color: #0a7b35; }
  .err { color: #b00020; }
</style>
</head>
<body>
<h1>OAuth callback — Nature &amp; Space Facts</h1>
<p>This page receives the OAuth redirect from TikTok. Copy the
<strong>authorization code</strong> below and paste it into the terminal
where the publishing script is waiting.</p>

<div id="result">Reading parameters…</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const error = params.get('error');
  const errorDesc = params.get('error_description');
  const out = document.getElementById('result');

  if (error) {
    out.innerHTML = '<p class="err"><strong>Error:</strong> ' +
      error + (errorDesc ? ' — ' + decodeURIComponent(errorDesc) : '') + '</p>';
  } else if (code) {
    out.innerHTML =
      '<p class="ok">Authorization succeeded. Copy this code into the terminal:</p>' +
      '<div class="box" id="code">' + code + '</div>' +
      '<button onclick="navigator.clipboard.writeText(document.getElementById(\'code\').innerText); this.innerText=\'Copied\';">Copy code</button>' +
      (state ? '<p style="margin-top:18px;font-size:12px;color:#666;">state: <code>' + state + '</code></p>' : '');
  } else {
    out.innerHTML = '<p class="err">No <code>code</code> parameter in URL. ' +
      'Did you reach this page via TikTok redirect?</p>';
  }
</script>
</body>
</html>
